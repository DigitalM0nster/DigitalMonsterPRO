<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Minimal Premium Sci‑Fi SVG Icons</title>
<style>
:root{color-scheme:dark}
*{box-sizing:border-box}
body{margin:0;background:#060a10;color:#e5f9ff;font-family:Inter,Arial,sans-serif;padding:32px}
.wrap{max-width:1100px;margin:0 auto}
h1{font-size:22px;margin:0 0 24px;letter-spacing:.03em}
h2{font-size:14px;font-weight:600;color:#9fd9e8;margin:24px 0 12px;text-transform:uppercase;letter-spacing:.08em}
.grid{display:grid;grid-template-columns:repeat(5,minmax(140px,1fr));gap:18px}
.card{border:1px solid #173646;background:#09111a;border-radius:18px;padding:18px;text-align:center}
.icon64,.icon32{display:block;margin:0 auto;color:#7fe4ff}
.icon64{width:64px;height:64px}
.icon32{width:32px;height:32px}
.label{margin-top:12px;font-size:13px;letter-spacing:.06em;text-transform:uppercase}
.smallcap{margin-top:10px;font-size:11px;color:#9dc6d1}
@media (max-width:920px){.grid{grid-template-columns:repeat(2,minmax(140px,1fr))}}
@media (max-width:520px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <h1>Minimal Premium Sci‑Fi SVG Icons</h1>
  <h2>64 px</h2>
  <div class="grid">
    <div class="card"><img class="icon64" src="home.svg" alt="Главная"><div class="label">Главная</div></div>
    <div class="card"><img class="icon64" src="portfolio.svg" alt="Портфолио"><div class="label">Портфолио</div></div>
    <div class="card"><img class="icon64" src="laboratory.svg" alt="Лаборатория"><div class="label">Лаборатория</div></div>
    <div class="card"><img class="icon64" src="about.svg" alt="О компании"><div class="label">О компании</div></div>
    <div class="card"><img class="icon64" src="contacts.svg" alt="Контакты"><div class="label">Контакты</div></div>
  </div>
  <h2>32 px</h2>
  <div class="grid">
    <div class="card"><img class="icon32" src="home.svg" alt="Главная"><div class="smallcap">home.svg</div></div>
    <div class="card"><img class="icon32" src="portfolio.svg" alt="Портфолио"><div class="smallcap">portfolio.svg</div></div>
    <div class="card"><img class="icon32" src="laboratory.svg" alt="Лаборатория"><div class="smallcap">laboratory.svg</div></div>
    <div class="card"><img class="icon32" src="about.svg" alt="О компании"><div class="smallcap">about.svg</div></div>
    <div class="card"><img class="icon32" src="contacts.svg" alt="Контакты"><div class="smallcap">contacts.svg</div></div>
  </div>
</div>
</body>
</html>
