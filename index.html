<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/png" href="/images/DM_logo.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>DigitalMonster</title>
		<style>
			@font-face {
				font-family: Aquire;
				src: url("/fonts/aquire/AquireLight.otf") format("opentype");
				font-weight: 300;
				font-display: swap;
			}
			@font-face {
				font-family: ManifoldExtended;
				src: url("/fonts/ManifoldExtended/ManifoldExtendedCF-Light.woff") format("woff");
				font-weight: 300;
				font-display: swap;
			}
			@font-face {
				font-family: MazzardM;
				src: url("/fonts/MazzardM/MazzardM-Light.woff") format("woff");
				font-weight: 300;
				font-display: swap;
			}
			html,
			body,
			#root {
				width: 100%;
				height: 100%;
				margin: 0;
				background: #000204;
			}
			.digitalMonsterLoader {
				position: fixed;
				inset: 0;
				z-index: 4;
				display: grid;
				place-items: center;
				overflow: hidden;
				color: #f6fbff;
				background: #000204;
			}
			.digitalMonsterLoaderOrb {
				position: relative;
				width: min(80vh, 48vw);
				min-width: 620px;
				aspect-ratio: 1;
				border-radius: 50%;
				transform: scale(0.75);
				transform-origin: center;
				overflow: visible;
			}
			.loaderOuterOrbit,
			.loaderMiddleOrbit {
				position: absolute;
				left: 50%;
				top: 50%;
				border-radius: 50%;
				transform: translate(-50%, -50%) rotate(0);
				pointer-events: none;
				will-change: transform;
			}
			.loaderOuterOrbit {
				--loader-orbit-arcs: conic-gradient(
					from 0deg,
					transparent 0 12%,
					rgba(0, 83, 190, 0.08) 15%,
					rgba(0, 128, 255, 0.42) 22%,
					rgba(0, 174, 255, 0.92) 27%,
					#36cfff 30%,
					rgba(0, 174, 255, 0.92) 33%,
					rgba(0, 128, 255, 0.42) 38%,
					rgba(0, 83, 190, 0.08) 45%,
					transparent 48% 67%,
					rgba(0, 83, 190, 0.08) 68%,
					rgba(0, 128, 255, 0.42) 74%,
					rgba(0, 174, 255, 0.92) 79%,
					#36cfff 82%,
					rgba(0, 174, 255, 0.92) 85%,
					rgba(0, 128, 255, 0.42) 90%,
					rgba(0, 83, 190, 0.08) 97%,
					transparent 100%
				);
				--loader-orbit-bloom: conic-gradient(
					from 0deg,
					transparent 0 20%,
					rgba(0, 75, 255, 0.18) 25%,
					#007eff 30%,
					#9af6ff 31.5%,
					#007eff 33%,
					rgba(0, 75, 255, 0.18) 37%,
					transparent 40% 70%,
					rgba(0, 75, 255, 0.18) 77%,
					#007eff 81%,
					#9af6ff 84%,
					#007eff 85%,
					rgba(0, 75, 255, 0.18) 90%,
					transparent 92% 100%
				);
				width: 110%;
				height: 110%;
				animation: loaderOuterOrbitRotate 24s linear infinite;
				animation-delay: var(--loader-animation-offset, 0s);
			}
			.loaderMiddleOrbit {
				--loader-orbit-arcs: conic-gradient(
					from 0deg,
					transparent 0 12%,
					rgba(0, 83, 190, 0.08) 15%,
					rgba(0, 128, 255, 0.42) 22%,
					rgba(0, 174, 255, 0.92) 27%,
					#36cfff 30%,
					rgba(0, 174, 255, 0.92) 33%,
					rgba(0, 128, 255, 0.42) 38%,
					rgba(0, 83, 190, 0.08) 45%,
					transparent 48% 100%
				);
				--loader-orbit-bloom: conic-gradient(
					from 0deg,
					transparent 0 22%,
					rgba(0, 75, 255, 0.18) 25%,
					#007eff 31%,
					#9af6ff 33%,
					#007eff 34%,
					rgba(0, 75, 255, 0.18) 37.6%,
					transparent 43% 100%
				);
				width: 94%;
				height: 94%;
				animation: loaderMiddleOrbitRotate 30s linear infinite;
				animation-delay: var(--loader-animation-offset, 0s);
			}
			.loaderOuterOrbitCore,
			.loaderOuterOrbitGlow {
				position: absolute;
				inset: 0;
				border-radius: inherit;
				pointer-events: none;
			}
			.loaderOuterOrbitCore {
				background: var(--loader-orbit-arcs);
				-webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 2px), #000 calc(100% - 1px));
				mask: radial-gradient(farthest-side, transparent calc(100% - 2px), #000 calc(100% - 1px));
			}
			.loaderOuterOrbitGlowNear {
				opacity: 1;
				filter: brightness(1.8) drop-shadow(0 0 2px rgba(174, 248, 255, 1)) drop-shadow(0 0 4px rgba(0, 207, 255, 1)) drop-shadow(0 0 8px rgba(0, 113, 255, 1))
					drop-shadow(0 0 14px rgba(0, 55, 255, 0.85));
			}
			.loaderOuterOrbitGlowSource {
				position: absolute;
				inset: 0;
				border-radius: inherit;
				background: var(--loader-orbit-bloom);
				-webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 4px), #000 calc(100% - 2px), transparent 100%);
				mask: radial-gradient(farthest-side, transparent calc(100% - 4px), #000 calc(100% - 2px), transparent 100%);
			}
			@keyframes loaderOuterOrbitRotate {
				to {
					transform: translate(-50%, -50%) rotate(360deg);
				}
			}
			@keyframes loaderMiddleOrbitRotate {
				to {
					transform: translate(-50%, -50%) rotate(360deg);
				}
			}
			.digitalMonsterLoaderRings {
				position: absolute;
				inset: 0;
				width: 100%;
				height: 100%;
				overflow: visible;
				pointer-events: none;
			}
			.digitalMonsterLoaderRings circle {
				vector-effect: non-scaling-stroke;
				fill: none;
			}
			.loaderRingInner {
				stroke: rgba(0, 184, 255, 0.25);
				stroke-width: 1;
			}
			.loaderRingDotted {
				stroke: rgba(0, 174, 255, 0.7);
				stroke-width: 2;
				stroke-linecap: round;
				stroke-dasharray: 1 8;
			}
			.digitalMonsterLoaderContent {
				position: absolute;
				inset: 0;
				display: flex;
				align-items: center;
				justify-content: center;
				font-family: MazzardM, sans-serif;
				text-align: center;
				border-radius: 50%;
				overflow: hidden;
			}
			/* Brand + % / loading / bar — one block dead-center (no language until React @ 100%). */
			.digitalMonsterLoaderMain {
				position: relative;
				display: flex;
				flex-direction: column;
				align-items: center;
				width: min(78%, 420px);
			}
			.digitalMonsterLoaderBrand {
				display: flex;
				flex-direction: column;
				align-items: center;
				color: #f5f9ff;
				font-family: Aquire, ManifoldExtended, sans-serif;
				font-size: clamp(42px, 3.1vw, 62px);
				font-weight: 300;
				line-height: 1.06;
				letter-spacing: 10px;
				white-space: nowrap;
			}
			.digitalMonsterLoaderSwap {
				position: relative;
				display: flex;
				flex-direction: column;
				align-items: center;
				width: 100%;
				margin-top: 14px;
			}
			.digitalMonsterLoaderProgress {
				display: flex;
				flex-direction: column;
				align-items: center;
				width: 100%;
				margin-top: 0;
			}
			.digitalMonsterLoaderProgress strong {
				color: #f4f8ff;
				font:
					300 clamp(35px, 3.25vw, 46px)/1 ManifoldExtended,
					sans-serif;
			}
			.digitalMonsterLoaderProgress > span {
				margin-top: 12px;
				color: rgba(211, 219, 230, 0.7);
				font:
					300 16px/1 MazzardM,
					sans-serif;
				letter-spacing: 1px;
			}
			.digitalMonsterLoaderTrack {
				position: relative;
				width: 54%;
				height: 2px;
				margin-top: 29px;
				background: rgba(231, 235, 238, 0.25);
				overflow: visible;
			}
			.digitalMonsterLoaderTrack i {
				position: absolute;
				inset: 0 auto 0 0;
				width: var(--loader-snake-head, var(--loader-progress, 0%));
				max-width: 100%;
				background: #00a9ff;
				opacity: 1;
				box-shadow: 0 0 4px rgba(0, 169, 255, 0.28);
			}
			.digitalMonsterLoaderTrack i::after {
				content: "";
				position: absolute;
				top: 50%;
				right: 0;
				width: 5px;
				height: 2px;
				border-radius: 1px;
				transform: translateY(-50%);
				background: #fff;
				opacity: var(--loader-tip-opacity, 1);
				transition: opacity 0.45s ease;
				box-shadow:
					0 0 3px rgba(255, 255, 255, 0.7),
					0 0 8px rgba(0, 169, 255, 0.55);
			}
			.digitalMonsterLoaderSnake {
				position: absolute;
				top: 50%;
				left: var(--loader-snake-tail, 0%);
				width: max(0px, calc(var(--loader-snake-head, var(--loader-progress, 0%)) - var(--loader-snake-tail, 0%)));
				height: 2px;
				transform: translateY(-50%);
				pointer-events: none;
				background: linear-gradient(
					90deg,
					rgba(0, 169, 255, 0) 0%,
					rgba(0, 169, 255, 0.22) 28%,
					rgba(0, 169, 255, 0.7) 62%,
					rgba(170, 220, 255, 0.95) 100%
				);
				box-shadow: 0 0 8px rgba(0, 169, 255, 0.4);
			}
			.digitalMonsterLoaderSnake::before {
				content: "";
				position: absolute;
				inset: -2px 0;
				background: inherit;
				filter: blur(2.2px);
				opacity: 0.7;
			}
			@media (max-width: 900px), (max-height: 720px) {
				.digitalMonsterLoaderOrb {
					width: min(92vw, 88vh);
					min-width: 0;
				}
				.digitalMonsterLoaderBrand {
					font-size: clamp(34px, 8vw, 52px);
				}
				.digitalMonsterLoaderProgress strong {
					font-size: clamp(32px, 8vw, 48px);
				}
			}
		</style>
	</head>
	<body>
		<div id="root">
			<div class="digitalMonsterLoader" aria-label="Loading" style="--loader-progress: 0%; --loader-snake-head: 0%; --loader-snake-tail: 0%; --loader-tip-opacity: 1; --loader-animation-offset: 0s">
				<div class="digitalMonsterLoaderOrb">
					<div class="loaderOuterOrbit" aria-hidden="true">
						<div class="loaderOuterOrbitGlow loaderOuterOrbitGlowNear"><div class="loaderOuterOrbitGlowSource"></div></div>
						<div class="loaderOuterOrbitCore"></div>
					</div>
					<div class="loaderMiddleOrbit" aria-hidden="true">
						<div class="loaderOuterOrbitGlow loaderOuterOrbitGlowNear"><div class="loaderOuterOrbitGlowSource"></div></div>
						<div class="loaderOuterOrbitCore"></div>
					</div>
					<svg class="digitalMonsterLoaderRings" viewBox="0 0 1000 1000" aria-hidden="true">
						<circle class="loaderRingInner" cx="500" cy="500" r="470"></circle>
						<circle class="loaderRingDotted" cx="500" cy="500" r="438"></circle>
					</svg>
					<div class="digitalMonsterLoaderContent">
						<div class="digitalMonsterLoaderMain">
							<div class="digitalMonsterLoaderBrand"><span>DIGITAL</span><span>MONSTER</span></div>
							<div class="digitalMonsterLoaderSwap">
								<div class="digitalMonsterLoaderProgress">
									<strong id="bootstrapLoaderPercent">0%</strong>
									<span>ЗАГРУЗКА / LOADING</span>
									<div class="digitalMonsterLoaderTrack"><i id="bootstrapLoaderTrack"></i><span class="digitalMonsterLoaderSnake" aria-hidden="true"></span></div>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
		<script>
			window.__loaderBootstrapStartedAt = Date.now();
			window.__loaderBootstrapProgress = 0;
			window.__loaderBootstrapSnakeHead = 0;
			window.__loaderBootstrapSnakeTail = 0;
			window.__loaderBootstrapResourceBonus = 0;
			// Visible-only elapsed — wall-clock jumps to 98% after a long background tab.
			window.__loaderBootstrapActiveElapsed = 0;
			window.__loaderBootstrapLastTs = performance.now();
			if ("PerformanceObserver" in window) {
				window.__loaderBootstrapObserver = new PerformanceObserver(function (list) {
					list.getEntries().forEach(function (entry) {
						var bytes = entry.transferSize || entry.encodedBodySize || 0;
						window.__loaderBootstrapResourceBonus += 0.08 + Math.min(1.2, (bytes / 1048576) * 0.2);
					});
				});
				try {
					window.__loaderBootstrapObserver.observe({ type: "resource", buffered: true });
				} catch (error) {}
			}
			function __loaderBootstrapTick(now) {
				window.__loaderBootstrapRaf = requestAnimationFrame(__loaderBootstrapTick);
				// Pause fake progress while hidden; rAF still reschedules so we resume cleanly.
				if (document.hidden) {
					window.__loaderBootstrapLastTs = now;
					return;
				}
				var last = window.__loaderBootstrapLastTs || now;
				window.__loaderBootstrapLastTs = now;
				var dt = Math.max(0.001, Math.min(0.05, (now - last) / 1000));
				window.__loaderBootstrapActiveElapsed += dt;
				var elapsed = window.__loaderBootstrapActiveElapsed;
				var continuous = Math.min(98.5, Math.min(12, elapsed * 1.5) + Math.max(0, elapsed - 8) * 0.45);
				var progress = Math.min(98.5, continuous + window.__loaderBootstrapResourceBonus);
				window.__loaderBootstrapProgress = progress;
				// Smooth head/tail — same tip for fill + snake, no 80ms stepping.
				var head = window.__loaderBootstrapSnakeHead || 0;
				head += (progress - head) * (1 - Math.exp(-7.5 * dt));
				if (head > progress) head = progress;
				window.__loaderBootstrapSnakeHead = head;
				var tail = window.__loaderBootstrapSnakeTail || 0;
				var gap = head - tail;
				var catchRate = gap > 0.2 ? 3.2 : 10;
				tail += gap * (1 - Math.exp(-catchRate * dt));
				if (tail > head) tail = head;
				if (head - tail > 12) {
					tail += (head - 12 - tail) * (1 - Math.exp(-8 * dt));
				}
				window.__loaderBootstrapSnakeTail = tail;
				var percent = document.getElementById("bootstrapLoaderPercent");
				var loader = document.querySelector(".digitalMonsterLoader");
				if (percent) percent.textContent = Math.floor(progress) + "%";
				if (loader) {
					loader.style.setProperty("--loader-progress", progress + "%");
					loader.style.setProperty("--loader-snake-head", head + "%");
					loader.style.setProperty("--loader-snake-tail", tail + "%");
					loader.style.setProperty("--loader-tip-opacity", head >= 99.9 ? "0" : "1");
				}
			}
			document.addEventListener("visibilitychange", function () {
				window.__loaderBootstrapLastTs = performance.now();
			});
			window.__loaderBootstrapRaf = requestAnimationFrame(__loaderBootstrapTick);
		</script>
		<script type="module" src="/src/main.jsx"></script>
	</body>
</html>
